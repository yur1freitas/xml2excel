exclude = [
    '.bzr',
    '.direnv',
    '.eggs',
    '.git',
    '.git-rewrite',
    '.hg',
    '.ipynb_checkpoints',
    '.mypy_cache',
    '.nox',
    '.pants.d',
    '.pyenv',
    '.pytest_cache',
    '.ruff_cache',
    '.svn',
    '.tox',
    '.venv',
    '.vscode',
    '__pypackages__',
    '_build',
    'buck-out',
    'build',
    'dist',
    'node_modules',
    'site-packages',
    'venv',
]
line-length = 80
indent-width = 4
target-version = 'py312'

[lint]
select = ['E4', 'E7', 'E9', 'F']
ignore = []
fixable = ['ALL']
unfixable = []
dummy-variable-rgx = '^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$'

[format]
line-ending = 'lf'
quote-style = 'single'
indent-style = 'space'
skip-magic-trailing-comma = false
docstring-code-format = false
docstring-code-line-length = 'dynamic'
